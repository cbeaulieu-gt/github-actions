name: Lint

on: [push, pull_request]

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2
      - name: Lint composite actions
        shell: bash
        run: |
          curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          ./actionlint \
            pr-review/action.yml \
            tag-claude/action.yml \
            check-auth/action.yml \
            apply-fix/action.yml
